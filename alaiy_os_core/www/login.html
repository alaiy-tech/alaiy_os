<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Alaiy OS</title>
  <link rel="icon" type="image/png" href="/assets/alaiy_os_core/images/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
      background: #ffffff;
      min-height: 100vh;
      color: #0b2a3f;
    }

    /* Override any Frappe base styles that may leak in */
    * { font-family: inherit; }

    .topbar {
      position: fixed;
      top: 24px;
      left: 32px;
      z-index: 100;
    }
    .topbar img { height: 34px; display: block; }

    .page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 80px 20px 48px;
    }

    .card { width: 100%; max-width: 420px; }

    .client-logo {
      display: block;
      max-width: 240px;
      height: auto;
      margin: 0 auto 28px;
    }

    .heading {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
      font-family: "Poppins", sans-serif;
    }
    .subheading {
      font-size: 14px;
      color: #64748b;
      text-align: center;
      margin-bottom: 18px;
      font-family: "Poppins", sans-serif;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
      width: 100%;
    }
    .label {
      font-size: 14px;
      font-weight: 500;
      font-family: "Poppins", sans-serif;
    }
    .forgot {
      font-size: 12px;
      color: #0891b2;
      text-decoration: none;
      font-family: "Poppins", sans-serif;
    }
    .forgot:hover { text-decoration: underline; }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      font-family: "Poppins", sans-serif !important;
      font-size: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      outline: none;
      color: #0b2a3f;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 16px;
      -webkit-appearance: none;
    }
    input:focus {
      border-color: #0891b2;
      box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.12);
    }
    input::placeholder { color: #94a3b8; font-family: "Poppins", sans-serif; }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #0b2a3f;
      color: #fff;
      font-family: "Poppins", sans-serif !important;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
      -webkit-appearance: none;
    }
    .btn-login:hover { opacity: 0.88; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      color: #dc2626;
      font-size: 12px;
      font-family: "Poppins", sans-serif;
      margin-bottom: 12px;
      min-height: 16px;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <img src="/assets/alaiy_os_core/images/logo-hor.png" alt="Alaiy OS">
  </div>

  <div class="page">
    <div class="card">

      <img
        class="client-logo"
        src="/assets/alaiy_os_core/client/assets/client-logo-hor.png"
        alt="Alaiy OS"
      >

      <h1 class="heading">Login</h1>
      <p class="subheading">Enter your email below to login to your account</p>

      <p class="error-msg" id="err"></p>

      <form id="login-form" novalidate>
        <div class="label-row">
           <label class="label" for="usr">Email</label>
        </div>
        <input id="usr" name="usr" type="email" placeholder="admin@example.com" autocomplete="username" required>
        <div class="label-row">
          <label class="label" for="pwd">Password</label>
          <a class="forgot" href="/update-password">Forgot your password?</a>
        </div>
        <input id="pwd" name="pwd" type="password" autocomplete="current-password" required>
        <button class="btn-login" id="submit-btn" type="submit">Login</button>
      </form>

    </div>
  </div>

  <script>
    (function () {
      var form = document.getElementById("login-form");
      var btn  = document.getElementById("submit-btn");
      var err  = document.getElementById("err");

      // Read redirect-to from query string (Frappe passes this when session expires)
      function getRedirectTo() {
        var params = new URLSearchParams(window.location.search);
        var r = params.get("redirect-to") || params.get("redirect_to") || "";
        // Safety: only allow relative paths to prevent open redirect
        if (r && r.startsWith("/") && !r.startsWith("//")) return r;
        return "/desk/os";
      }

      // Read CSRF token from cookie
      function getCsrf() {
        var m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/);
        return m ? decodeURIComponent(m[1]) : "";
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        err.textContent = "";
        btn.disabled = true;
        btn.textContent = "Logging in\u2026";

        var body = new URLSearchParams({
          usr: document.getElementById("usr").value.trim(),
          pwd: document.getElementById("pwd").value,
        });

        fetch("/api/method/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-Frappe-CSRF-Token": getCsrf(),
          },
          body: body.toString(),
        })
        .then(function (r) {
          return r.json().then(function (j) { return { status: r.status, json: j }; });
        })
        .then(function (res) {
          if (res.status === 200 && res.json.message === "Logged In") {
            // Prefer server-supplied redirect, then query param, then default
            window.location.href = getRedirectTo();
          } else {
            var msg = (res.json && (res.json.message || res.json.exc_type)) || "Invalid credentials";
            err.textContent = msg;
            btn.disabled = false;
            btn.textContent = "Login";
          }
        })
        .catch(function () {
          err.textContent = "Login failed. Please try again.";
          btn.disabled = false;
          btn.textContent = "Login";
        });
      });
    })();
  </script>
</body>
</html>
